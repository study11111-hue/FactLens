# ── Railway Configuration ─────────────────────────────────────
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Shell form handles $PORT expansion correctly
startCommand = "sh -c 'python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --log-level info'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
