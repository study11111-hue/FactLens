# ── Railway Configuration ─────────────────────────────────────
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Hardcode port to 8000 to match the domain's targetPort in Railway
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
