# ── Railway Configuration ─────────────────────────────────────
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here — let the Dockerfile CMD handle it
# CMD uses shell form: sh -c "uvicorn ... --port ${PORT:-8000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Health check ─────────────────────────────────────────────
# 90s initial delay: sentence-transformers model loads on first startup
[[deploy.healthcheck]]
httpPath = "/health"
initialDelaySeconds = 90
timeoutSeconds = 15
intervalSeconds = 30
